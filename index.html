const wd=['日','月','火','水','木','金','土'];
let status=JSON.parse(localStorage.getItem('evStatus')||'{}');
function setStatus(k,s){ if(status[k]===s)delete status[k]; else status[k]=s; localStorage.setItem('evStatus',JSON.stringify(status)); render(); }
/* t の表記は「19:00〜21:00」「17:50受付/18:00〜21:00」「時間未定」「—」など揺れる。
   split('-') 前提だと大半が不正なURLになるので、時刻は正規表現で拾い、拾えなければ終日予定にする。 */
function ymdPlus(dstr,add){const t=new Date(dstr+'T00:00:00');t.setDate(t.getDate()+(add||0));
  return ''+t.getFullYear()+String(t.getMonth()+1).padStart(2,'0')+String(t.getDate()).padStart(2,'0');}
function gcal(ev){
  const hhmm=(ev.t||'').match(/\d{1,2}:\d{2}/g)||[];
  const multiDay=ev.endd&&ev.endd!==ev.d;
  let dates;
  if(hhmm.length&&!multiDay){
    const pad=function(x){const p=x.split(':');return String(p[0]).padStart(2,'0')+p[1];};
    const st=pad(hhmm[0]);
    const en=hhmm.length>1?pad(hhmm[1]):String(Math.min(+hhmm[0].split(':')[0]+2,23)).padStart(2,'0')+hhmm[0].split(':')[1];
    /* 終了が開始以前なら日をまたぐ扱い */
    const endDay=(en<=st)?ymdPlus(ev.d,1):ymdPlus(ev.d,0);
    dates=ymdPlus(ev.d,0)+'T'+st+'00/'+endDay+'T'+en+'00';
  }else{
    /* 終日予定。Googleカレンダーの終日は終了日を+1する仕様 */
    dates=ymdPlus(ev.d,0)+'/'+ymdPlus(ev.endd||ev.d,1);
  }
  const p=new URLSearchParams({action:'TEMPLATE',text:ev.n,dates:dates,
    details:(ev.t&&!/^[—\-]$/.test(ev.t)?'時間: '+ev.t+'\n':'')+'申込/詳細: '+ev.u,location:ev.a||''});
  return 'https://calendar.google.com/calendar/render?'+p.toString();
}
function dlabel(ev){const dt=new Date(ev.d);let s=(dt.getMonth()+1)+'/'+dt.getDate()+'('+wd[dt.getDay()]+')';if(ev.endd){const e=new Date(ev.endd);s+='–'+(e.getMonth()+1)+'/'+e.getDate();}return s;}

   '<button class="'+(cur==='maybe'?'on-maybe':'')+'" onclick="setStatus(\''+k.replace(/'/g,"\\'")+'\',\'maybe\')">🟡検討</button>'+
   '<button class="'+(cur==='done'?'on-done':'')+'" onclick="setStatus(\''+k.replace(/'/g,"\\'")+'\',\'done\')">⚪済</button></div>';}
function stClass(k){const s=status[k];return s==='go'?'st-go':s==='maybe'?'st-maybe':s==='done'?'st-done':'';}
/* カテゴリはデータから自動生成する。手書きリストにすると、データにあるのにボタンが無い（＝絞り込めない）／
   ボタンはあるのにデータが0件（＝押すと空）という事故が起きるため、実データを唯一の正とする。 */
const CATORDER=['対話/キャリア','学び','地域活性','ランニング','スポーツ','観戦','趣味','酒場'];
const CATS=(function(){
  var has={};dated.concat(recurring).forEach(function(e){has[e.c]=(has[e.c]||0)+1;});
  var known=CATORDER.filter(function(c){return has[c];});
  var rest=Object.keys(has).filter(function(c){return CATORDER.indexOf(c)<0;}).sort();
  return known.concat(rest);
})();
let activeCat='すべて',activeSt='すべて';
const STF={'すべて':'','行く':'go','検討':'maybe','済':'done','未設定':'none'};
function pass(k){if(activeSt==='すべて')return true;const v=STF[activeSt];if(v==='none')return !status[k];return status[k]===v;}
/* ===== 日付フィルタ ===== */
let dateMode='すべて',activeDate='';
const DMODES=['すべて','今日','明日','今週末','今後7日'];
function ymd(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function onDay(e,day){return e.d<=day&&(e.endd||e.d)>=day;}
function inRange(e,from,to){return e.d<=to&&(e.endd||e.d)>=from;}
function datePass(e){
  if(dateMode==='すべて')return true;
  var t=new Date();t.setHours(0,0,0,0);
  if(dateMode==='今日')return onDay(e,ymd(t));
  if(dateMode==='明日'){var d=new Date(t);d.setDate(d.getDate()+1);return onDay(e,ymd(d));}
  if(dateMode==='今週末'){
    var dow=t.getDay();
    if(dow===0)return onDay(e,ymd(t));                       /* 今日が日曜なら今日のみ */
    var sat=new Date(t);sat.setDate(sat.getDate()+((6-dow)+7)%7); /* 直近の土曜(今日が土なら今日) */
    var sun=new Date(sat);sun.setDate(sun.getDate()+1);
    return inRange(e,ymd(sat),ymd(sun));
  }
  if(dateMode==='今後7日'){var e7=new Date(t);e7.setDate(e7.getDate()+6);return inRange(e,ymd(t),ymd(e7));}
  if(dateMode==='日付指定'&&activeDate)return onDay(e,activeDate);
  return true;
}
function render(){
  const fc=document.getElementById('filters');fc.innerHTML='';
  ['すべて'].concat(CATS).forEach(function(c){var b=document.createElement('button');b.textContent=c;if(c===activeCat)b.className='on';b.onclick=function(){activeCat=c;render();};fc.appendChild(b);});
  const sf=document.getElementById('stfilters');sf.innerHTML='';
  Object.keys(STF).forEach(function(c){var b=document.createElement('button');b.textContent=c;if(c===activeSt)b.className='on';b.onclick=function(){activeSt=c;render();};sf.appendChild(b);});
  var ft=document.createElement('button');ft.textContent=(hideFounder?'☑ ':'☐ ')+'⚠️起業寄りを隠す';if(hideFounder)ft.className='on';ft.onclick=function(){hideFounder=!hideFounder;render();};sf.appendChild(ft);
  /* ===== 日付フィルタUI ===== */
  const df=document.getElementById('dtfilters');df.innerHTML='';
  DMODES.forEach(function(m){var b=document.createElement('button');b.textContent=m;if(dateMode===m)b.className='on';b.onclick=function(){dateMode=m;activeDate='';render();};df.appendChild(b);});
  var inp=document.createElement('input');inp.type='date';inp.value=activeDate;inp.className='dtin';if(dateMode==='日付指定')inp.classList.add('on');
  inp.onchange=function(){activeDate=this.value;dateMode=this.value?'日付指定':'すべて';render();};
  df.appendChild(inp);
  if(dateMode==='日付指定'&&activeDate){var cl=document.createElement('button');cl.textContent='×  解除';cl.onclick=function(){activeDate='';dateMode='すべて';render();};df.appendChild(cl);}
  const list=document.getElementById('list');list.innerHTML='';
  var _shown=0;
  dated.slice().sort(function(a,b){return a.d>b.d?1:a.d<b.d?-1:0;}).filter(function(e){var _t=new Date();_t.setHours(0,0,0,0);return (activeCat==='すべて'||e.c===activeCat)&&pass(e.n)&&(!hideFounder||!isFounder(e))&&datePass(e)&&new Date((e.endd||e.d)+'T23:59:59')>=_t;}).forEach(function(e){
    _shown++;
    var lvtxt=e.l===3?'◎◎':e.l===2?'◎':'○';var nm=splitName(e);
    var card=document.createElement('div');card.className='card l'+e.l+' '+stClass(e.n);if(isFounder(e))card.style.opacity='0.68';
    card.innerHTML='<div class="date">'+dlabel(e)+'<small>'+(e.t||'終日')+'</small></div>'+
      '<div class="main"><div>'+gbadge(e)+'<span class="lv lv'+e.l+'">'+lvtxt+'</span></div>'+
      '<div class="title">'+nm[0]+fwb(e)+'</div>'+
      (nm[1]?'<div class="detail">'+nm[1]+'</div>':'')+
      '<div class="meta2">📍'+e.a+'　💴'+e.f+'</div></div>'+
      '<div class="btns"><a class="apply" href="'+e.u+'" target="_blank">申込</a><a class="cal" href="'+gcal(e)+'" target="_blank">📅追加</a></div>'+
      stBtns(e.n);
    list.appendChild(card);
  });
  /* 見出しに絞り込み結果の件数を表示 */
  var _dh=document.getElementById('datedHead');
  if(_dh){
    var _lbl=(dateMode==='すべて')?'📅 日付が決まっているもの（早い順）'
      :(dateMode==='日付指定'?'📅 '+activeDate+' に参加できるもの':'📅 '+dateMode+'に参加できるもの');
    _dh.innerHTML=_lbl+' <span style="font-weight:400;color:var(--sub);font-size:12px">— '+_shown+'件</span>'+
      (_shown===0?'<div style="font-weight:400;color:var(--sub);font-size:12px;margin-top:6px">条件に合うイベントがありません。日付や絞り込みを変えてみてください。</div>':'');
  }
  const rc=document.getElementById('recurring');rc.innerHTML='';
  recurring.filter(function(e){return (activeCat==='すべて'||e.c===activeCat)&&pass(e.n)&&(!hideFounder||!isFounder(e));}).forEach(function(e){
    var lvtxt=e.l===3?'◎◎':e.l===2?'◎':'○';var nm=splitName(e);
    var card=document.createElement('div');card.className='card l'+e.l+' '+stClass(e.n);if(isFounder(e))card.style.opacity='0.68';
    card.innerHTML='<div class="main"><div>'+gbadge(e)+'<span class="lv lv'+e.l+'">'+lvtxt+'</span></div>'+
      '<div class="title">'+nm[0]+fwb(e)+'</div>'+
      (nm[1]?'<div class="detail">'+nm[1]+'</div>':'')+
      '<div class="meta2">📍'+e.a+'　💴'+e.f+'</div></div>'+
      '<div class="btns"><a class="apply" href="'+e.u+'" target="_blank">詳細/参加</a></div>'+stBtns(e.n);
    rc.appendChild(card);
  });
}
var gc=document.getElementById('give');
give.forEach(function(e){var lvtxt=e.l===3?'◎◎':e.l===2?'◎':'○';var nm=splitName(e);var card=document.createElement('div');card.className='card l'+e.l;card.innerHTML='<div class="main"><div><span class="gb" style="background:#0369a1;color:#fff">🤲 与える</span><span class="lv lv'+e.l+'">'+lvtxt+'</span></div><div class="title">'+nm[0]+'</div>'+(nm[1]?'<div class="detail">'+nm[1]+'</div>':'')+'<div class="meta2">💴'+e.f+'</div></div><div class="btns"><a class="apply" href="'+e.u+'" target="_blank">始める</a></div>';gc.appendChild(card);});
render();
</script>
</body>
</html>
