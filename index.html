function genreOf(e){for(var i=0;i<GENRES.length;i++){if(GENRES[i][0].test(e.n))return GENRES[i].slice(1);}

 return['📖','学び','#4f46e5','#fff'];}
function splitName(e){var n=e.n,m=n.indexOf('（');if(m<0)return[n,''];return[n.slice(0,m),n.slice(m+1).replace(/）/g,'')];}
function gbadge(e){var g=genreOf(e);return '<span class="gb" style="background:'+g[2]+';color:'+g[3]+'">'+g[0]+' '+g[1]+'</span>';}
const wd=['日','月','火','水','木','金','土'];
let status=JSON.parse(localStorage.getItem('evStatus')||'{}');
function setStatus(k,s){ if(status[k]===s)delete status[k]; else status[k]=s; localStorage.setItem('evStatus',JSON.stringify(status)); render(); }
function gcal(ev){
  const s=ev.d.replace(/-/g,'');let dates;
  if(ev.t){const[a,b]=ev.t.split('-');dates=s+'T'+a.replace(':','')+'00/'+s+'T'+(b||a).replace(':','')+'00';}
  else{const end=(ev.endd||ev.d).replace(/-/g,'');const ed=new Date(end.slice(0,4),+end.slice(4,6)-1,+end.slice(6,8)+1);const en=''+ed.getFullYear()+String(ed.getMonth()+1).padStart(2,'0')+String(ed.getDate()).padStart(2,'0');dates=s+'/'+en;}
  const p=new URLSearchParams({action:'TEMPLATE',text:ev.n,dates:dates,details:'申込/詳細: '+ev.u,location:ev.a||''});
  return 'https://calendar.google.com/calendar/render?'+p.toString();
}
function dlabel(ev){const dt=new Date(ev.d);let s=(dt.getMonth()+1)+'/'+dt.getDate()+'('+wd[dt.getDay()]+')';if(ev.endd){const e=new Date(ev.endd);s+='–'+(e.getMonth()+1)+'/'+e.getDate();}return s;}
function stBtns(k){const cur=status[k]||'';

   '<button class="'+(cur==='go'?'on-go':'')+'" onclick="setStatus(\''+k.replace(/'/g,"\\'")+'\',\'go\')">🟢行く</button>'+
   '<button class="'+(cur==='maybe'?'on-maybe':'')+'" onclick="setStatus(\''+k.replace(/'/g,"\\'")+'\',\'maybe\')">🟡検討</button>'+
   '<button class="'+(cur==='done'?'on-done':'')+'" onclick="setStatus(\''+k.replace(/'/g,"\\'")+'\',\'done\')">⚪済</button></div>';}
function stClass(k){const s=status[k];return s==='go'?'st-go':s==='maybe'?'st-maybe':s==='done'?'st-done':'';}
let activeCat='すべて',activeSt='すべて';
const STF={'すべて':'','行く':'go','検討':'maybe','済':'done','未設定':'none'};
function pass(k){if(activeSt==='すべて')return true;const v=STF[activeSt];if(v==='none')return !status[k];return status[k]===v;}
function render(){
  const fc=document.getElementById('filters');fc.innerHTML='';
  ['すべて'].concat(CATS).forEach(function(c){var b=document.createElement('button');b.textContent=c;if(c===activeCat)b.className='on';b.onclick=function(){activeCat=c;render();};fc.appendChild(b);});

  Object.keys(STF).forEach(function(c){var b=document.createElement('button');b.textContent=c;if(c===activeSt)b.className='on';b.onclick=function(){activeSt=c;render();};sf.appendChild(b);});
  var ft=document.createElement('button');ft.textContent=(hideFounder?'☑ ':'☐ ')+'⚠️起業寄りを隠す';if(hideFounder)ft.className='on';ft.onclick=function(){hideFounder=!hideFounder;render();};sf.appendChild(ft);
  const list=document.getElementById('list');list.innerHTML='';
  dated.slice().sort(function(a,b){return a.d>b.d?1:a.d<b.d?-1:0;}).filter(function(e){var _t=new Date();_t.setHours(0,0,0,0);return (activeCat==='すべて'||e.c===activeCat)&&pass(e.n)&&(!hideFounder||!isFounder(e))&&new Date((e.endd||e.d)+'T23:59:59')>=_t;}).forEach(function(e){
    var lvtxt=e.l===3?'◎◎':e.l===2?'◎':'○';var nm=splitName(e);
    var card=document.createElement('div');card.className='card l'+e.l+' '+stClass(e.n);if(isFounder(e))card.style.opacity='0.68';

      stBtns(e.n);
    list.appendChild(card);

    var card=document.createElement('div');card.className='card l'+e.l+' '+stClass(e.n);if(isFounder(e))card.style.opacity='0.68';

      '<div class="title">'+nm[0]+fwb(e)+'</div>'+
      (nm[1]?'<div class="detail">'+nm[1]+'</div>':'')+
      '<div class="meta2">📍'+e.a+'　💴'+e.f+'</div></div>'+
      '<div class="btns"><a class="apply" href="'+e.u+'" target="_blank">詳細/参加</a></div>'+stBtns(e.n);
    rc.appendChild(card);

give.forEach(function(e){var lvtxt=e.l===3?'◎◎':e.l===2?'◎':'○';var nm=splitName(e);var card=document.createElement('div');card.className='card l'+e.l;card.innerHTML='<div class="main"><div><span class="gb" style="background:#0369a1;color:#fff">🤲 与える</span><span class="lv lv'+e.l+'">'+lvtxt+'</span></div><div class="title">'+nm[0]+'</div>'+(nm[1]?'<div class="detail">'+nm[1]+'</div>':'')+'<div class="meta2">💴'+e.f+'</div></div><div class="btns"><a class="apply" href="'+e.u+'" target="_blank">始める</a></div>';gc.appendChild(card);});
